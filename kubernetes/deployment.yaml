apiVersion: apps/v1
kind: Deployment

metadata:
  name: xyz-bank-deployment
  namespace: xyz-bank

spec:
  replicas: 2

  selector:
    matchLabels:
      app: xyz-bank

  template:
    metadata:
      labels:
        app: xyz-bank

    spec:
      containers:
      - name: xyz-bank-container
        image: sonie03e/xyz-bank-demo:latest

        ports:
        - containerPort: 8081

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"

          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /customers
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /customers
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5